<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISSIN YID-NEƔ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: url('https://static.vecteezy.com/system/resources/previews/022/574/885/non_2x/flat-design-colorful-kids-background-free-vector.jpg') center/cover fixed;
      color: white;
      min-height: 100vh;
    }

    header {
      background: rgb(0, 162, 255);
      padding: 2px;
      text-align: center;
      box-shadow: 0 4px 2px rgba(0,0,0,0.2);
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
      font-size: 28px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* SECTION LECTEUR VIDEO CENTRÉ */
    .player-container {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      width: 100%;
    }

    video {
      width: 100%;
      max-width: 800px; /* Limite la taille sur ordinateur */
      border-radius: 20px;
      border: 5px solid white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      background-color: black;
    }

    /* GRILLE DES FILMS */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #00ff40;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h3 {
      padding: 15px;
      text-align: center;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.6);
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #00ff40;
      font-weight: bold;
      font-size: 20px;
      text-shadow: 1px 1px 2px black;
    }
  </style>
</head>
<body>

<header>
  <img src="issin yid-neɣ.png" alt="Colorful rounded letters reading ISSIN YID-NEƔ on a dark background" style="width: 320px; height: auto;">
</header>

<div class="container">

  <h2><img src="i yigerdan.png" alt="Colorful rounded letters reading i yigerdan on a dark background" style="width: 150px; height: auto;"> </h2>

  <div class="player-container">
    <video id="videoPlayer" controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la lecture de vidéos.
    </video>
  </div>

  <div class="movies-grid">
    
    <div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <img src="https://m.media-amazon.com/images/M/MV5BNjRjYzNjNjEtYmEyNi00NjI5LTk3NmUtNWRhMjE0Y2FjOWZhXkEyXkFqcGc@._V1_.jpg" alt="Animated movie thumbnail for Amɣar aneɣrum showing a smiling cartoon character on a vibrant background">
      <h3>Amɣar aneɣrum</h3>
    </div>

    <div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKmpql0trkEuNupCZxevr8jj3ZcA4DiC9gH7UfvSSGVIaMXYHUN3TtJO_M-857xhXhlpSmujFPp0LZRp1uvy6V8jChKi-AbbfECO_Zlw&s=10" alt="Animated movie thumbnail showing a colorful cartoon character on a bright background">
      <h3>kulla</h3>
    </div>

    <div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgjA8PxHRh-TtWBfD3--wcc--MfzctoX57Gg&s" alt="Animated movie thumbnail showing a stylized cartoon character with vivid colors">
      <h3>Ṭum akked Jerry</h3>
    </div>

    <div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
      <img src="https://asekles.online/Sans%20titre6.jpg" alt="Animated movie thumbnail showing playful cartoon characters on a lively colored background">
      <h3>Maca akked micka</h3>
    </div>

  </div>

</div>

<footer>
  ISSIN YID-NEƔ &copy; 2024
</footer>

<script>
  function playVideo(videoUrl) {
    const player = document.getElementById("videoPlayer");
    player.src = videoUrl;
    player.play();
    
    // Scroll automatique vers le haut pour voir la vidéo quand on clique sur une carte
    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }
</script>

</body>
</html>
